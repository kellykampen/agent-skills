# Crabbox config — run a focus-stealing GUI E2E suite on a REMOTE headless box instead of
# locally, so it never grabs this machine's mouse/keyboard.
#
# ADAPT PER PROJECT: e2b.template (your template name), sync.exclude (your build dirs +
# big siblings), jobs.e2e.command (your install + E2E recipe — mirror your CI E2E step).
#
# ACTIVE provider: e2b — brokerless, per-second, fastest. Run with `pnpm test:e2e:remote`.
# Daytona is kept below but BLOCKED: crabbox caps Daytona command exec at 60s (SDK
# process/execute deadline, no override), and a real GUI suite is ~2min. See run.sh/README.

provider: e2b
target: linux

e2b:
  # Built from crabbox/Dockerfile.e2e (see the skill's setup steps).
  template: CHANGE_ME-e2e            # ← must match `e2b template create <name> ...`
  workdir: crabbox                   # remote workdir → /home/user/crabbox (matches Dockerfile WORKDIR)

daytona:
  # BLOCKED (60s exec cap) — kept so re-enabling is trivial if crabbox lifts it.
  snapshot: CHANGE_ME-e2e
  user: daytona
  workRoot: /home/daytona/crabbox
  sshAccessMinutes: 30

sync:
  delete: true
  checksum: false
  gitSeed: true
  fingerprint: true
  timeout: 15m
  warnFiles: 50000
  warnBytes: 5368709120
  failFiles: 150000
  failBytes: 21474836480
  # Never ship these to the box — node_modules is reinstalled remotely, build output is
  # regenerated by the run. Add any big sibling dirs your repo has (e.g. .worktrees).
  exclude:
    - .cache
    - .turbo
    - .git
    - dist
    - out
    - node_modules
    - .npm
    - .yarn/cache
    - .pnpm-store
    - .worktrees
    - test-results
    - playwright-report

run:
  preflightTools:
    - corepack
    - node
    - pnpm

env:
  # Do NOT forward NODE_OPTIONS — a machine-local `--require <abs path>` in it won't exist on
  # the remote box and crashes Node before anything runs.
  allow:
    - CI
    # Optional spec filter for target-only runs (clean-box proof of one spec, fast
    # iteration): E2E_SPEC_FILTER=e2e/foo.spec.ts pnpm test:e2e:remote
    - E2E_SPEC_FILTER

jobs:
  # `crabbox job run e2e` (or the `pnpm test:e2e:remote` wrapper). Deps aren't synced, so
  # install first, then run the E2E command under a virtual display. MIRROR YOUR CI E2E STEP.
  # `test:e2e` itself should do any native rebuild + app build + the test runner.
  e2e:
    shell: true
    command: >
      corepack enable &&
      mkdir -p "$HOME/.electron-gyp" && cp -rn /opt/electron-gyp/. "$HOME/.electron-gyp/" &&
      pnpm install --frozen-lockfile &&
      xvfb-run --auto-servernum pnpm run test:e2e -- ${E2E_SPEC_FILTER:-}
    env:
      CI: "true"
    stop: auto
