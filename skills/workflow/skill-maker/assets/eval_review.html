<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Set Review - __SKILL_NAME_PLACEHOLDER__</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --surface: #141a22; --surface-2: #1a212b;
      --border: #27303c; --border-strong: #394453;
      --text: #e6ebf2; --text-muted: #8b96a5; --text-faint: #5b6675;
      --accent: #f0b429; --accent-ink: #0d1117; --accent-hover: #ffc94d;
      --red: #f47067;
      --font-display: 'Bricolage Grotesque', sans-serif;
      --font-body: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      color-scheme: dark;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6f8; --surface: #ffffff; --surface-2: #eef1f5;
        --border: #dde3ea; --border-strong: #c3ccd7;
        --text: #1a2330; --text-muted: #57616e; --text-faint: #8792a0;
        --accent: #b26a00; --accent-ink: #ffffff; --accent-hover: #935700;
        --red: #cf222e;
        color-scheme: light;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); padding: 2rem; color: var(--text); -webkit-font-smoothing: antialiased; }
    h1 { font-family: var(--font-display); margin-bottom: 0.5rem; font-size: 1.4rem; letter-spacing: -0.01em; }
    .description { color: var(--text-muted); margin-bottom: 1.5rem; max-width: 900px; font-size: 0.875rem; line-height: 1.55; }
    .controls { margin-bottom: 1rem; display: flex; gap: 0.5rem; }
    .btn { font-family: var(--font-body); padding: 0.5rem 1.1rem; border: 1px solid var(--border-strong); border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 600; background: transparent; color: var(--text-muted); transition: all 0.15s; }
    .btn:hover { color: var(--text); border-color: var(--text-faint); }
    .btn-export { background: var(--accent); border-color: transparent; color: var(--accent-ink); }
    .btn-export:hover { background: var(--accent-hover); color: var(--accent-ink); }
    table { width: 100%; max-width: 1100px; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    th { font-family: var(--font-mono); background: var(--surface-2); color: var(--text-faint); padding: 0.7rem 1rem; text-align: left; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em; border-bottom: 1px solid var(--border); }
    td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: var(--surface-2); }
    .section-header td { background: var(--surface-2); font-family: var(--font-mono); font-weight: 600; font-size: 0.62rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.14em; }
    .query-input { width: 100%; padding: 0.5rem; border: 1px solid var(--border-strong); border-radius: 6px; font-size: 0.875rem; font-family: var(--font-body); background: var(--bg); color: var(--text); resize: vertical; min-height: 60px; line-height: 1.5; }
    .query-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px #f0b42922; }
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; inset: 0; background: var(--border-strong); border-radius: 24px; cursor: pointer; transition: 0.2s; }
    .toggle .slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: var(--surface); border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(20px); background: var(--accent-ink); }
    .btn-delete { background: transparent; color: var(--red); padding: 0.3rem 0.6rem; border: 1px solid var(--border-strong); border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-family: var(--font-body); font-weight: 600; }
    .btn-delete:hover { border-color: var(--red); }
    .summary { margin-top: 1rem; color: var(--text-faint); font-size: 0.8rem; font-family: var(--font-mono); }
  </style>
</head>
<body>
  <h1>Eval Set Review: <span id="skill-name">__SKILL_NAME_PLACEHOLDER__</span></h1>
  <p class="description">Current description: <span id="skill-desc">__SKILL_DESCRIPTION_PLACEHOLDER__</span></p>

  <div class="controls">
    <button class="btn btn-add" onclick="addRow()">+ Add Query</button>
    <button class="btn btn-export" onclick="exportEvalSet()">Export Eval Set</button>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:65%">Query</th>
        <th style="width:18%">Should Trigger</th>
        <th style="width:10%">Actions</th>
      </tr>
    </thead>
    <tbody id="eval-body"></tbody>
  </table>

  <p class="summary" id="summary"></p>

  <script>
    const EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;

    let evalItems = [...EVAL_DATA];

    function render() {
      const tbody = document.getElementById('eval-body');
      tbody.innerHTML = '';

      // Sort: should-trigger first, then should-not-trigger
      const sorted = evalItems
        .map((item, origIdx) => ({ ...item, origIdx }))
        .sort((a, b) => (b.should_trigger ? 1 : 0) - (a.should_trigger ? 1 : 0));

      let lastGroup = null;
      sorted.forEach(item => {
        const group = item.should_trigger ? 'trigger' : 'no-trigger';
        if (group !== lastGroup) {
          const headerRow = document.createElement('tr');
          headerRow.className = 'section-header';
          headerRow.innerHTML = `<td colspan="3">${item.should_trigger ? 'Should Trigger' : 'Should NOT Trigger'}</td>`;
          tbody.appendChild(headerRow);
          lastGroup = group;
        }

        const idx = item.origIdx;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><textarea class="query-input" onchange="updateQuery(${idx}, this.value)">${escapeHtml(item.query)}</textarea></td>
          <td>
            <label class="toggle">
              <input type="checkbox" ${item.should_trigger ? 'checked' : ''} onchange="updateTrigger(${idx}, this.checked)">
              <span class="slider"></span>
            </label>
            <span style="margin-left:8px;font-size:0.8rem;color:#b0aea5">${item.should_trigger ? 'Yes' : 'No'}</span>
          </td>
          <td><button class="btn-delete" onclick="deleteRow(${idx})">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });
      updateSummary();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateQuery(idx, value) { evalItems[idx].query = value; updateSummary(); }
    function updateTrigger(idx, value) { evalItems[idx].should_trigger = value; render(); }
    function deleteRow(idx) { evalItems.splice(idx, 1); render(); }

    function addRow() {
      evalItems.push({ query: '', should_trigger: true });
      render();
      const inputs = document.querySelectorAll('.query-input');
      inputs[inputs.length - 1].focus();
    }

    function updateSummary() {
      const trigger = evalItems.filter(i => i.should_trigger).length;
      const noTrigger = evalItems.filter(i => !i.should_trigger).length;
      document.getElementById('summary').textContent =
        `${evalItems.length} queries total: ${trigger} should trigger, ${noTrigger} should not trigger`;
    }

    function exportEvalSet() {
      const valid = evalItems.filter(i => i.query.trim() !== '');
      const data = valid.map(i => ({ query: i.query.trim(), should_trigger: i.should_trigger }));
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'eval_set.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    render();
  </script>
</body>
</html>
